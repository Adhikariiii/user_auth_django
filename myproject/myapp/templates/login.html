<h2>login page</h2>

{% for message in messages%}
<p style="color: red">{{message}}</p>
{% endfor %}

<form method="POST" action="{% url 'login' %}">
  {% csrf_token%}
  <p>username:</p>
  <input type="text" name="username" />
  <p>password:</p>
  <input type="password" name="password" />
  <br />
  <br />
  <input type="submit" />
</form>
